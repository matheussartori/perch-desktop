<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Strict CSP: only self-hosted code and inline styles. blob:/mediastream:
      are allowed for media so WebRTC video renders; ws:/wss: for signaling.
      No remote scripts, no web fonts.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self' blob: mediastream:; connect-src 'self' ws: wss:"
    />
    <title>Perch</title>
    <style>
      html,
      body {
        margin: 0;
        background: #0b0c0f;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>

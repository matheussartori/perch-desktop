appId: dev.sartori.perch
productName: Perch
copyright: Copyright © 2026 Matheus Sartori

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - package.json

asar: true
asarUnpack:
  # Native nut-js bindings must live on disk unpacked to load at runtime.
  - "**/node_modules/@nut-tree-fork/**"

# --- macOS: portable .app inside a zip, no installer, no admin ---
mac:
  category: public.app-category.productivity
  target:
    - target: zip
      arch: [arm64, x64]
  # Accessibility (input control) + audio are user-granted permissions, never admin.
  extendInfo:
    NSMicrophoneUsageDescription: Perch streams audio during a remote session.
    NSCameraUsageDescription: Perch streams your screen during a remote session.
  # Dev builds are unsigned; set an identity/notarization in CI for release.
  identity: null

# --- Windows: single portable exe, runs without install or admin ---
win:
  target:
    - target: portable
      arch: [x64]
portable:
  artifactName: Perch-${version}-portable.exe
  requestExecutionLevel: user

# --- Linux: AppImage is portable by nature ---
linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Utility
